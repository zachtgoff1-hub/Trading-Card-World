<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background cosmic gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="45%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#06051f"/>
    </radialGradient>

    <!-- Center card cream face -->
    <linearGradient id="cardFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefcf5"/>
      <stop offset="100%" stop-color="#ead9b3"/>
    </linearGradient>

    <!-- Back-of-card royal blue/purple -->
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Gold border -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Lightning bolt gradient -->
    <linearGradient id="boltGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>

    <!-- Soft halo behind the cards -->
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#60a5fa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for the bolt -->
    <filter id="boltGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow behind cards -->
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background plate (rounded for Android, iOS will mask) -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgGrad)"/>

  <!-- Sparkles / stars -->
  <g fill="#ffffff">
    <circle cx="170" cy="200" r="2.5" opacity="0.85"/>
    <circle cx="850" cy="170" r="3" opacity="0.9"/>
    <circle cx="900" cy="400" r="1.8" opacity="0.75"/>
    <circle cx="120" cy="500" r="2" opacity="0.8"/>
    <circle cx="180" cy="820" r="1.6" opacity="0.65"/>
    <circle cx="880" cy="780" r="2.5" opacity="0.8"/>
    <circle cx="780" cy="900" r="1.5" opacity="0.55"/>
    <circle cx="280" cy="130" r="2" opacity="0.7"/>
    <circle cx="700" cy="100" r="1.5" opacity="0.6"/>
    <circle cx="940" cy="600" r="1.8" opacity="0.6"/>
    <circle cx="80" cy="700" r="1.2" opacity="0.5"/>
    <circle cx="500" cy="90" r="1.6" opacity="0.7"/>
  </g>

  <!-- Glowing halo behind the hand of cards -->
  <circle cx="512" cy="510" r="400" fill="url(#haloGrad)"/>

  <!-- LEFT back card (rotated -20°) -->
  <g transform="translate(512 545) rotate(-20) translate(-180 -260)" filter="url(#cardShadow)">
    <rect width="360" height="520" rx="40" fill="url(#goldGrad)"/>
    <rect x="16" y="16" width="328" height="488" rx="28" fill="url(#cardBack)"/>
    <g transform="translate(180 260)" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.55">
      <path d="M 0 -140 L 95 0 L 0 140 L -95 0 Z"/>
      <path d="M 0 -85 L 58 0 L 0 85 L -58 0 Z"/>
      <circle r="24"/>
    </g>
  </g>

  <!-- RIGHT back card (rotated +20°) -->
  <g transform="translate(512 545) rotate(20) translate(-180 -260)" filter="url(#cardShadow)">
    <rect width="360" height="520" rx="40" fill="url(#goldGrad)"/>
    <rect x="16" y="16" width="328" height="488" rx="28" fill="url(#cardBack)"/>
    <g transform="translate(180 260)" stroke="#fbbf24" stroke-width="3" fill="none" opacity="0.55">
      <path d="M 0 -140 L 95 0 L 0 140 L -95 0 Z"/>
      <path d="M 0 -85 L 58 0 L 0 85 L -58 0 Z"/>
      <circle r="24"/>
    </g>
  </g>

  <!-- CENTER front card -->
  <g transform="translate(332 252)" filter="url(#cardShadow)">
    <rect width="360" height="520" rx="40" fill="url(#goldGrad)"/>
    <rect x="16" y="16" width="328" height="488" rx="28" fill="url(#cardFront)"/>

    <!-- inner gold accent line -->
    <rect x="32" y="32" width="296" height="456" rx="18" fill="none" stroke="#d97706" stroke-width="2" opacity="0.4"/>

    <!-- Lightning bolt centered on card -->
    <g transform="translate(40 120) scale(2.8)">
      <path d="M 55 0 L 25 55 L 45 55 L 35 100 L 75 40 L 55 40 Z"
            fill="url(#boltGrad)"
            stroke="#7c2d12"
            stroke-width="2"
            stroke-linejoin="round"
            filter="url(#boltGlow)"/>
    </g>
  </g>
</svg>
